<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sol — Kindly Brighton</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #fff8f5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    max-width: 480px;
    margin: 0 auto;
  }
  .header { background:#ff0054;color:white;padding:16px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10; }
  .header-icon { width:36px;height:36px;background:rgba(255,255,255,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px; }
  .header-text h1 { font-size:18px;font-weight:600; }
  .header-text p { font-size:12px;opacity:0.85;margin-top:1px; }
  .status-dot { width:8px;height:8px;background:#4ade80;border-radius:50%;margin-left:auto;box-shadow:0 0 0 2px rgba(255,255,255,0.3); }
  .chat-area { flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;min-height:400px; }
  .message { display:flex;gap:8px;align-items:flex-start;animation:fadeIn 0.2s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(4px)}to{opacity:1} }
  .message.user { flex-direction:row-reverse; }
  .avatar { width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600; }
  .avatar.sol { background:#ff0054;color:white; }
  .avatar.user { background:#e8f0eb;color:#4A7C59; }
  .bubble { max-width:82%;padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.6; }
  .bubble.sol { background:white;border:0.5px solid #ffe0e8;border-bottom-left-radius:4px;color:#1a0a0f; }
  .bubble.user { background:#ff0054;color:white;border-bottom-right-radius:4px; }
  .bubble a { color: #ff0054; text-decoration: underline; font-weight: bold; }
  .typing-indicator { display:flex;gap:4px;padding:14px;background:white;border:0.5px solid #ffe0e8;border-radius:18px;border-bottom-left-radius:4px;width:fit-content; }
  .typing-dot { width:6px;height:6px;background:#ff0054;border-radius:50%;animation:bounce 1.2s infinite;opacity:0.4; }
  .typing-dot:nth-child(2){animation-delay:0.2s}
  .typing-dot:nth-child(3){animation-delay:0.4s}
  @keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:0.4}30%{transform:translateY(-6px);opacity:1}}
  .quick-actions { padding:0 16px 8px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none; }
  .quick-actions::-webkit-scrollbar{display:none}
  .quick-btn { white-space:nowrap;padding:6px 12px;border-radius:16px;border:1px solid #ffb3c8;background:white;color:#ff0054;font-size:12px;cursor:pointer;flex-shrink:0; }
  .quick-btn.refill { border: 2px solid #ff0054; font-weight: 600; }
  .input-area { padding:12px 16px 20px;background:white;border-top:0.5px solid #ffe0e8;display:flex;flex-direction:column;gap:8px; }
  .image-preview { display:none;position:relative;width:fit-content; }
  .image-preview img { max-height:80px;border-radius:8px;border:1px solid #ffe0e8; }
  .remove-img { position:absolute;top:-6px;right:-6px;width:18px;height:18px;background:#ff0054;color:white;border-radius:50%;font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none; }
  .input-row { display:flex;gap:8px;align-items:flex-end; }
  .attach-btn { width:40px;height:40px;border-radius:50%;border:1px solid #ffb3c8;background:white;color:#ff0054;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0; }
  .text-input { flex:1;padding:10px 14px;border-radius:20px;border:1px solid #ffb3c8;font-size:14px;outline:none;resize:none;max-height:100px;line-height:1.4;font-family:inherit;background:#fff8f5; }
  .send-btn { width:40px;height:40px;border-radius:50%;border:none;background:#ff0054;color:white;font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0; }
  #file-input{display:none}
  .impact-banner { margin:0 16px 4px;background:#fff0f5;border:0.5px solid #ffb3c8;border-radius:12px;padding:10px 14px;display:flex;gap:12px;overflow-x:auto;scrollbar-width:none; }
  .impact-stat{text-align:center;flex-shrink:0}
  .impact-stat .num{font-size:15px;font-weight:600;color:#ff0054}
  .impact-stat .lbl{font-size:10px;color:#888;margin-top:1px}
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">☀️</div>
  <div class="header-text">
    <h1>Sol</h1>
    <p>Kindly Brighton · AI Guide</p>
  </div>
  <div class="status-dot"></div>
</div>

<div class="impact-banner">
  <div class="impact-stat"><div class="num">370K+</div><div class="lbl">plastics diverted</div></div>
  <div class="impact-stat"><div class="num">66t</div><div class="lbl">CO₂ saved</div></div>
  <div class="impact-stat"><div class="num">66p</div><div class="lbl">stays in Brighton</div></div>
  <div class="impact-stat"><div class="num">75%</div><div class="lbl">return customers</div></div>
</div>

<div class="chat-area" id="chat">
  <div class="message">
    <div class="avatar sol">S</div>
    <div class="bubble sol">Hi! I'm Sol. Photograph a product, scan a refill code, or ask me anything. What's on your list today? 🌱</div>
  </div>
</div>

<div class="quick-actions">
  <button class="quick-btn refill" onclick="triggerRefillScan()">📸 Scan any Product</button>
  <button class="quick-btn" onclick="sendQuick('Is everything in the store vegan?')">Is everything vegan?</button>
  <button class="quick-btn" onclick="sendQuick('What are your opening hours?')">Opening hours</button>
  <button class="quick-btn" onclick="sendQuick('Tell me about your loyalty rewards')">Loyalty Rewards</button>
</div>

<div class="input-area">
  <div class="image-preview" id="img-preview">
    <img id="preview-img" src="" alt="preview" />
    <button class="remove-img" onclick="removeImage()">×</button>
  </div>
  <div class="input-row">
    <button class="attach-btn" onclick="document.getElementById('file-input').click()">📷</button>
    <input type="file" id="file-input" accept="image/*" onchange="handleImage(this)" />
    <textarea class="text-input" id="msg-input" placeholder="Ask about any product..."
      rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"
      oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `You are Sol — the friendly, planet-passionate AI guide for Kindly Brighton.

FORMATTING RULES:
- Use bullet points (•) for all lists.
- ALWAYS use new lines for each store and each day's hours.
- Use bold text for emphasis.

OPENING HOURS:
**York Place**
• Mon–Sat: 8am – 8pm
• Sunday: 10am – 7pm

**Dyke Road**
• Mon–Thu: 9am – 8pm
• Fri–Sat: 9am – 7pm
• Sunday: 10am – 7pm

LOYALTY REWARDS:
Every shop at Kindly is a vote for a plastic-free future—why not get rewarded for it? 🌍
Join our community and turn your planet-positive choices into treats. **Every £1 you spend earns you 1 point.** Check out the rewards:
• **250 points** = **£5 OFF** your shop
• **500 points** = **£10 OFF** your shop

Sign up takes just 30 seconds at the till, or you can **[click here to join the revolution and start earning now!](https://start.mylty.co/?id=21913)**. Ready to make your shop count?

REFILL INSTRUCTIONS (Avery Berkel):
If a user asks how to refill, use these 4 steps:
1. **TARE:** Place your empty container on the Avery Berkel scale to print your 'Tare' label.
2. **FILL:** Take as much or as little as you need from the bins or pumps.
3. **LABEL:** Scan your Tare label at the scale, enter the 4-digit code (I can give you this!), and print your final product label.
4. **TILL:** Take your labeled items to the counter and the staff will do the rest!

*Friendly Tip: Forgot a jar? We have free donated ones and paper bags available!*

MULTI-SCENARIO RULES:
1. REFILL BINS: If you see a 4-digit code (e.g., 1038), it is a refill. Prioritize database info.
2. ALLERGENS: Never say "it's safe." Always say: "Check the physical label and ask staff to be certain."`;

let imageBase64 = null;
let messages = [];
let isLoading = false;

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function triggerRefillScan() {
    addMessage('sol', 'Ready to refill? Snap a photo of the bin code, then follow the 4 steps: **Tare, Fill, Label, and Till!**');
    document.getElementById('file-input').click();
}

function handleImage(input) {
  const file = input.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      let width = img.width;
      let height = img.height;
      const MAX_SIZE = 800; 

      if (width > height) {
        if (width > MAX_SIZE) {
          height *= MAX_SIZE / width;
          width = MAX_SIZE;
        }
      } else {
        if (height > MAX_SIZE) {
          width *= MAX_SIZE / height;
          height = MAX_SIZE;
        }
      }

      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);

      const compressedBase64 = canvas.toDataURL('image/jpeg', 0.5); 
      imageBase64 = compressedBase64.split(',')[1];
      document.getElementById('preview-img').src = compressedBase64;
      document.getElementById('img-preview').style.display = 'block';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function removeImage() {
  imageBase64 = null;
  document.getElementById('img-preview').style.display = 'none';
}

function addMessage(role, content, imgSrc) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'message ' + role;
  
  const avatar = document.createElement('div');
  avatar.className = 'avatar ' + role;
  avatar.textContent = role === 'sol' ? 'S' : 'Y';
  
  const bubble = document.createElement('div');
  bubble.className = 'bubble ' + role;
  
  if (imgSrc) {
    const img = document.createElement('img');
    img.src = imgSrc;
    img.style.cssText = 'max-width:100%;border-radius:8px;margin-bottom:6px;display:block;';
    bubble.appendChild(img);
  }
  
  if (content) {
    let formatted = content.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
    formatted = formatted.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    formatted = formatted.replace(/\n/g, '<br>');
    bubble.innerHTML += formatted;
  }
  
  div.appendChild(avatar);
  div.appendChild(bubble);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'message'; div.id = 'typing';
  const av = document.createElement('div');
  av.className = 'avatar sol'; av.textContent = 'S';
  const ind = document.createElement('div');
  ind.className = 'typing-indicator';
  ind.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  div.appendChild(av); div.appendChild(ind);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }

function sendQuick(text) { document.getElementById('msg-input').value = text; sendMessage(); }

async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  const hasImage = !!imageBase64;
  if (!text && !hasImage) return;

  isLoading = true;
  document.getElementById('send-btn').disabled = true;

  let detectedMimeType = "image/jpeg";
  if (hasImage) {
    const previewSrc = document.getElementById('preview-img').src;
    const match = previewSrc.match(/^data:(image\/[a-z]+);base64,/);
    if (match) detectedMimeType = match[1];
  }

  addMessage('user', text || '(Photo upload)', hasImage ? document.getElementById('preview-img').src : null);
  input.value = ''; input.style.height = 'auto';

  const storedImg = imageBase64;
  removeImage();

  const userContent = [];
  if (hasImage) {
    userContent.push({ 
      type: 'image', 
      source: { 
        type: 'base64', 
        media_type: detectedMimeType, 
        data: storedImg 
      } 
    });
  }
  userContent.push({ type: 'text', text: text || 'Tell me about this product.' });

  messages.push({ role: 'user', content: userContent });
  showTyping();

  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ 
        model: 'claude-haiku-4-5-20251001', 
        max_tokens: 400, 
        system: SYSTEM_PROMPT, 
        messages: messages 
      })
    });

    const data = await response.json();
    removeTyping();

    if (data.error) {
      addMessage('sol', 'I hit a snag. One more try?');
    } else {
      const reply = data.content?.[0]?.text || '';
      addMessage('sol', reply);
      messages.push({ role: 'assistant', content: reply });
    }
  } catch(e) {
    removeTyping();
    addMessage('sol', 'Connection issue. One more try?');
  }

  isLoading = false;
  document.getElementById('send-btn').disabled = false;
}
</script>
</body>
</html>
