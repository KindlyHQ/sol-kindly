<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sol — Kindly Brighton</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #fff8f5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    max-width: 480px;
    margin: 0 auto;
  }
  .header { background:#ff0054;color:white;padding:16px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10; }
  .header-icon { width:36px;height:36px;background:rgba(255,255,255,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px; }
  .header-text h1 { font-size:18px;font-weight:600; }
  .header-text p { font-size:12px;opacity:0.85;margin-top:1px; }
  .status-dot { width:8px;height:8px;background:#4ade80;border-radius:50%;margin-left:auto;box-shadow:0 0 0 2px rgba(255,255,255,0.3); }
  .chat-area { flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;min-height:400px; }
  .message { display:flex;gap:8px;align-items:flex-start;animation:fadeIn 0.2s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(4px)}to{opacity:1} }
  .message.user { flex-direction:row-reverse; }
  .avatar { width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600; }
  .avatar.sol { background:#ff0054;color:white; }
  .avatar.user { background:#e8f0eb;color:#4A7C59; }
  .bubble { max-width:82%;padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.55; }
  .bubble.sol { background:white;border:0.5px solid #ffe0e8;border-bottom-left-radius:4px;color:#1a0a0f; }
  .bubble.user { background:#ff0054;color:white;border-bottom-right-radius:4px; }
  .typing-indicator { display:flex;gap:4px;padding:14px;background:white;border:0.5px solid #ffe0e8;border-radius:18px;border-bottom-left-radius:4px;width:fit-content; }
  .typing-dot { width:6px;height:6px;background:#ff0054;border-radius:50%;animation:bounce 1.2s infinite;opacity:0.4; }
  .typing-dot:nth-child(2){animation-delay:0.2s}
  .typing-dot:nth-child(3){animation-delay:0.4s}
  @keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:0.4}30%{transform:translateY(-6px);opacity:1}}

  /* ── Action buttons (Scan / Loyalty / Opening Hours) ── */
  .action-btns {
    padding: 10px 16px 4px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }
  .action-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 5px;
    padding: 10px 6px;
    border-radius: 14px;
    border: 1.5px solid #ffb3c8;
    background: white;
    color: #ff0054;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    transition: background 0.15s, transform 0.1s;
  }
  .action-btn:active { transform: scale(0.96); background: #fff0f5; }
  .action-btn .btn-icon { font-size: 20px; }

  /* ── Quick chips (scrollable secondary row) ── */
  .quick-actions { padding:6px 16px 8px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none; }
  .quick-actions::-webkit-scrollbar{display:none}
  .quick-btn { white-space:nowrap;padding:6px 12px;border-radius:16px;border:1px solid #ffb3c8;background:white;color:#ff0054;font-size:12px;cursor:pointer;flex-shrink:0; }
  .quick-btn:hover{background:#fff0f5}

  .input-area { padding:12px 16px 20px;background:white;border-top:0.5px solid #ffe0e8;display:flex;flex-direction:column;gap:8px; }
  .image-preview { display:none;position:relative;width:fit-content; }
  .image-preview img { max-height:80px;border-radius:8px;border:1px solid #ffe0e8; }
  .remove-img { position:absolute;top:-6px;right:-6px;width:18px;height:18px;background:#ff0054;color:white;border-radius:50%;font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none; }
  .input-row { display:flex;gap:8px;align-items:flex-end; }
  .attach-btn { width:40px;height:40px;border-radius:50%;border:1px solid #ffb3c8;background:white;color:#ff0054;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0; }
  .text-input { flex:1;padding:10px 14px;border-radius:20px;border:1px solid #ffb3c8;font-size:14px;outline:none;resize:none;max-height:100px;line-height:1.4;font-family:inherit;background:#fff8f5; }
  .text-input:focus{border-color:#ff0054;background:white}
  .send-btn { width:40px;height:40px;border-radius:50%;border:none;background:#ff0054;color:white;font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0; }
  .send-btn:disabled{opacity:0.4;cursor:not-allowed}
  #file-input{display:none}
  .impact-banner { margin:0 16px 4px;background:#fff0f5;border:0.5px solid #ffb3c8;border-radius:12px;padding:10px 14px;display:flex;gap:12px;overflow-x:auto;scrollbar-width:none; }
  .impact-stat{text-align:center;flex-shrink:0}
  .impact-stat .num{font-size:15px;font-weight:600;color:#ff0054}
  .impact-stat .lbl{font-size:10px;color:#888;margin-top:1px}
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">☀️</div>
  <div class="header-text">
    <h1>Sol</h1>
    <p>Kindly Brighton · Product Guide</p>
  </div>
  <div class="status-dot"></div>
</div>

<div class="impact-banner">
  <div class="impact-stat"><div class="num">370K+</div><div class="lbl">plastics diverted</div></div>
  <div class="impact-stat"><div class="num">66t</div><div class="lbl">CO₂ saved</div></div>
  <div class="impact-stat"><div class="num">66p</div><div class="lbl">stays in Brighton</div></div>
  <div class="impact-stat"><div class="num">75%</div><div class="lbl">return customers</div></div>
</div>

<div class="chat-area" id="chat">
  <div class="message">
    <div class="avatar sol">S</div>
    <div class="bubble sol">Hi! I'm Sol — Kindly's product guide. Photograph any product or ask me anything about what's in the shop. What can I help you with? 🌱</div>
  </div>
</div>

<!-- ── Primary action buttons ── -->
<div class="action-btns">
  <button class="action-btn" onclick="triggerScan()">
    <span class="btn-icon">📷</span>
    Scan
  </button>
  <button class="action-btn" onclick="sendQuick('Tell me about the Kindly loyalty scheme and how to sign up')">
    <span class="btn-icon">⭐</span>
    Loyalty
  </button>
  <button class="action-btn" onclick="sendQuick('What are the opening hours for both Kindly stores?')">
    <span class="btn-icon">🕐</span>
    Hours
  </button>
</div>

<!-- ── Secondary quick chips ── -->
<div class="quick-actions">
  <button class="quick-btn" onclick="sendQuick('Is everything in the store vegan?')">Is everything vegan?</button>
  <button class="quick-btn" onclick="sendQuick('Tell me about Kindly\'s environmental impact')">Our impact</button>
  <button class="quick-btn" onclick="sendQuick('Surprise me with a product story!')">Surprise me!</button>
</div>

<div class="input-area">
  <div class="image-preview" id="img-preview">
    <img id="preview-img" src="" alt="preview" />
    <button class="remove-img" onclick="removeImage()">×</button>
  </div>
  <div class="input-row">
    <button class="attach-btn" id="camera-btn" onclick="document.getElementById('file-input').click()">📷</button>
    <input type="file" id="file-input" accept="image/*" onchange="handleImage(this)" />
    <textarea class="text-input" id="msg-input" placeholder="Ask about any product..."
      rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"
      oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `You are Sol — the in-store AI guide for Kindly, Brighton's sustainable supermarket.

RESPONSE LENGTH — CRITICAL RULE:
Keep answers SHORT. 2-4 sentences maximum. Customers are standing in a shop. No bullet-point lists unless specifically asked. Lead with the most useful fact, then stop.

Personality: warm, Brighton, genuinely knowledgeable, zero pretension. Never preachy. Never start with "Great question!" or "Absolutely!".

About Kindly:
- UK's first hybrid sustainable supermarket, Brighton 2019, founded by Shiv Misra
- 100% plant-based, 100% single-use plastic-free, organic loose produce
- 370,000+ plastics diverted, 66t CO₂ saved, 5.8M litres water saved
- 66p of every £1 stays in the Brighton economy, 75% repeat customers

OPENING HOURS — answer exactly like this when asked:
York Place
Mon–Fri  8:00am – 7:00pm
Saturday  9:00am – 7:00pm
Sunday  10:00am – 5:00pm

Dyke Road
Mon–Sat  9:00am – 6:00pm
Sunday  10:00am – 4:00pm

LOYALTY SCHEME:
Kindly uses LoyalZoo. Every £1 spent earns points redeemable for discounts. Sign up at the till — takes 30 seconds. When relevant, mention it warmly as a genuine tip: "By the way, the Kindly loyalty scheme is worth signing up for — every £1 adds up and the team can sort it at the till in 30 seconds."

ALLERGEN RULES — NON-NEGOTIABLE:
Never say "yes it's safe" outright. Always add: "For severe allergies, check the physical label and speak to staff — they'll know."

When you don't know: "I don't have that detail yet — worth asking at the till."`;

let imageBase64 = null;
let imageType = null;
let messages = [];
let isLoading = false;

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function normaliseMimeType(type) {
  if (!type) return 'image/jpeg';
  const map = { 'image/jpg':'image/jpeg','image/JPG':'image/jpeg','image/JPEG':'image/jpeg','image/PNG':'image/png','image/GIF':'image/gif','image/WEBP':'image/webp' };
  return map[type] || type;
}

// Scan button — triggers the file input (camera on mobile)
function triggerScan() {
  document.getElementById('file-input').click();
}

function handleImage(input) {
  const file = input.files[0];
  if (!file) return;
  imageType = normaliseMimeType(file.type || 'image/jpeg');
  const reader = new FileReader();
  reader.onload = e => {
    imageBase64 = e.target.result.split(',')[1];
    document.getElementById('preview-img').src = e.target.result;
    document.getElementById('img-preview').style.display = 'block';
    // Auto-focus the text input so user can add a question if they want
    document.getElementById('msg-input').focus();
  };
  reader.readAsDataURL(file);
  input.value = '';
}

function removeImage() {
  imageBase64 = null; imageType = null;
  document.getElementById('img-preview').style.display = 'none';
  document.getElementById('preview-img').src = '';
}

function addMessage(role, content, imgSrc) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'message ' + role;
  const avatar = document.createElement('div');
  avatar.className = 'avatar ' + role;
  avatar.textContent = role === 'sol' ? 'S' : 'Y';
  const bubble = document.createElement('div');
  bubble.className = 'bubble ' + role;
  if (imgSrc) {
    const img = document.createElement('img');
    img.src = imgSrc;
    img.style.cssText = 'max-width:100%;border-radius:8px;margin-bottom:6px;display:block;';
    bubble.appendChild(img);
  }
  if (content) {
    const span = document.createElement('span');
    span.textContent = content;
    bubble.appendChild(span);
  }
  div.appendChild(avatar);
  div.appendChild(bubble);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'message'; div.id = 'typing';
  const av = document.createElement('div');
  av.className = 'avatar sol'; av.textContent = 'S';
  const ind = document.createElement('div');
  ind.className = 'typing-indicator';
  ind.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  div.appendChild(av); div.appendChild(ind);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }

function sendQuick(text) { document.getElementById('msg-input').value = text; sendMessage(); }

async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  const hasImage = !!imageBase64;
  if (!text && !hasImage) return;

  isLoading = true;
  document.getElementById('send-btn').disabled = true;

  addMessage('user', text || '(photographed a product)', hasImage ? `data:${imageType};base64,${imageBase64}` : null);
  input.value = ''; input.style.height = 'auto';

  const storedImg = imageBase64, storedType = imageType;
  removeImage();

  const userContent = [];
  if (hasImage) userContent.push({ type:'image', source:{ type:'base64', media_type:storedType, data:storedImg } });
  userContent.push({ type:'text', text: text || 'What can you tell me about this product? Is it vegan? Any allergens?' });

  messages.push({ role:'user', content:userContent });
  showTyping();

  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 400,
        system: SYSTEM_PROMPT,
        messages: messages
      })
    });

    const data = await response.json();
    removeTyping();

    if (data.error) {
      addMessage('sol', 'Something went wrong — please try again.');
      console.error('API error:', data.error);
    } else {
      const reply = data.content[0].text;
      addMessage('sol', reply);
      messages.push({ role:'assistant', content:reply });
      if (messages.length > 20) messages = messages.slice(-20);
    }
  } catch(e) {
    removeTyping();
    addMessage('sol', 'Connection error — please try again in a moment.');
  }

  isLoading = false;
  document.getElementById('send-btn').disabled = false;
}
</script>
</body>
</html>
